name: CI

on:
  push:
    branches: [main, refactor/three-layer-architecture]
    paths:
      - 'forge/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'forge/**'
      - 'scripts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install ruff pyright

      - name: Ruff lint
        run: ruff check forge/ scripts/ --output-format=github

      - name: Ruff format check
        run: ruff format --check forge/ scripts/

      - name: Syntax check (compile all Python)
        run: python -m compileall -q forge/ scripts/

  data-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Validate experiment configs
        run: |
          python3 -c "
          import yaml, sys, glob
          errors = []
          for f in sorted(glob.glob('experiments/*.yaml')):
              try:
                  with open(f) as fh:
                      data = yaml.safe_load(fh)
                  if not isinstance(data, dict):
                      errors.append(f'{f}: not a dict')
                  elif 'experiment' not in data and 'name' not in data:
                      errors.append(f'{f}: missing experiment/name key')
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          print(f'Validated {len(glob.glob(\"experiments/*.yaml\"))} experiment configs')
          "

      - name: Validate knowledge docs
        run: |
          python3 -c "
          import glob, sys
          errors = []
          for f in sorted(glob.glob('knowledge/**/*.md', recursive=True)):
              with open(f) as fh:
                  content = fh.read()
              if len(content.strip()) == 0:
                  errors.append(f'{f}: empty file')
              if len(content) > 50000:
                  errors.append(f'{f}: too large ({len(content)} bytes)')
          if errors:
              for e in errors:
                  print(f'::warning::{e}')
          print(f'Checked {len(glob.glob(\"knowledge/**/*.md\", recursive=True))} knowledge docs')
          "

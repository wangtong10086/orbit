name: CI

on:
  push:
    branches: [main, refactor/three-layer-architecture]
    paths:
      - 'forge/**'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'forge/**'
      - 'scripts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install ruff pyright

      - name: Ruff lint
        run: ruff check forge/ scripts/ --output-format=github

      - name: Syntax check (compile all Python)
        run: python -m compileall -q forge/ scripts/

  data-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Validate experiment configs
        run: |
          python3 -c "
          import yaml, sys, glob
          errors = []
          for f in sorted(glob.glob('experiments/*.yaml')):
              try:
                  with open(f) as fh:
                      data = yaml.safe_load(fh)
                  if not isinstance(data, dict):
                      errors.append(f'{f}: not a dict')
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          print(f'Validated {len(glob.glob(\"experiments/*.yaml\"))} experiment configs')
          "

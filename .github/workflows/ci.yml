name: CI

on:
  push:
    branches:
      - main
      - refactor/three-layer-architecture
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: uv venv

      - name: Install project and CI tools
        run: |
          uv pip install --python .venv/bin/python -e ".[control]"
          uv pip install --python .venv/bin/python pytest ruff build

      - name: Ruff
        run: .venv/bin/ruff check orbit tests scripts

      - name: Compile Python sources
        run: .venv/bin/python -m compileall -q orbit/ scripts/

      - name: CLI smoke checks
        run: |
          .venv/bin/python -m orbit --help
          .venv/bin/python -m orbit control --help
          .venv/bin/python -m orbit worker --help

      - name: Targeted tests
        run: .venv/bin/python -m pytest -q tests/test_cli.py tests/test_control.py tests/test_execution.py tests/test_compute.py -q

      - name: Build distribution
        run: .venv/bin/python -m build

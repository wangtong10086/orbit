<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="580" viewBox="0 0 1536 580" role="img" aria-labelledby="title desc">
  <title id="title">personal project ORBIT logo</title>
  <desc id="desc">A personal ORBIT wordmark with an abstract route mark made from hand-drawn paths and nodes.</desc>
  <defs>
    <linearGradient id="word" x1="650" y1="130" x2="1400" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#105f7a"/>
      <stop offset="0.55" stop-color="#1d3f72"/>
      <stop offset="1" stop-color="#6b3fa0"/>
    </linearGradient>
    <linearGradient id="trail" x1="120" y1="420" x2="550" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f28c38"/>
      <stop offset="0.52" stop-color="#1e9aa4"/>
      <stop offset="1" stop-color="#4c3f91"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#16304d" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1536" height="580" fill="#ffffff"/>

  <g filter="url(#soft)">
    <rect x="120" y="82" width="420" height="420" rx="96" fill="#f7fbfb"/>
    <path d="M194 367 C242 238, 346 155, 470 128" fill="none" stroke="#17345a" stroke-width="26" stroke-linecap="round"/>
    <path d="M186 420 C292 390, 410 306, 494 178" fill="none" stroke="url(#trail)" stroke-width="22" stroke-linecap="round"/>
    <path d="M230 278 C304 306, 383 306, 466 260" fill="none" stroke="#1e9aa4" stroke-width="14" stroke-linecap="round" opacity="0.82"/>
    <path d="M246 210 C332 184, 411 198, 474 248" fill="none" stroke="#f28c38" stroke-width="13" stroke-linecap="round" opacity="0.88"/>

    <circle cx="202" cy="418" r="30" fill="#f28c38"/>
    <circle cx="202" cy="418" r="18" fill="#ffffff"/>
    <circle cx="296" cy="264" r="23" fill="#1e9aa4"/>
    <circle cx="430" cy="146" r="25" fill="#17345a"/>
    <circle cx="494" cy="178" r="21" fill="#6b3fa0"/>
  </g>

  <text x="650" y="300" font-family="DejaVu Sans, Arial, sans-serif" font-weight="800" font-size="168" letter-spacing="0" fill="url(#word)">ORBIT</text>
  <text x="658" y="380" font-family="DejaVu Sans, Arial, sans-serif" font-weight="400" font-size="44" letter-spacing="0" fill="#17345a">personal research workspace</text>
</svg>

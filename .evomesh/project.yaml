name: affine-swarm
created: 2026-03-17
lang: en
accounts:
  main: ~/.claude
  -aly: ~/.claude-aly
  -unango: ~/.claude-unango
roles:
  strategist:
    type: worker
    loop_interval: 15m
    account: -unango
    scope:
      - .evomesh/roles/          # read/write ALL roles' ROLE.md (adversarial sections)
      - experiments/
      - knowledge/
      - PLAYBOOK.md
      - memory/
    description: >
      Strategy and experiment design. Never trains or generates data directly.
      Reads leaderboard + scoring algorithm + eval results → designs experiments
      (one variable each) → writes experiment YAML → writes directives into
      Trainer/Data ROLE.md adversarial sections. Owns gap analysis.
      Approves or rejects training launches.

  trainer:
    type: worker
    loop_interval: 15m
    account: -unango
    scope:
      - .evomesh/roles/trainer/
      - forge/training/
      - forge/compute/
      - forge/monitoring/
      - scripts/eval_envs.py
      - experiments/
      - knowledge/
      - memory/
    description: >
      Training execution and evaluation. Follows Strategist's experiment
      designs. Launches training, monitors loss, merges LoRA, deploys sglang,
      runs eval. Reports results back to experiments/*.yaml. Writes pushback
      in own ROLE.md adversarial section for Strategist to read.

  data:
    type: worker
    loop_interval: 15m
    account: -unango
    scope:
      - .evomesh/roles/data/
      - forge/data/
      - scripts/
      - synth_config.json
      - knowledge/
      - logs/
      - memory/
    description: >
      Data generation and curation. Follows Strategist's data directives.
      Generates synthetic data, extracts from DDB, validates format, uploads to
      HF. Writes quality concerns in own ROLE.md adversarial section for
      Strategist to read. Owns canonical data and format validation.
git:
  branch: main
  auto_push: true

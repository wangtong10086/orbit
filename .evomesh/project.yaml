name: affine-swarm
created: 2026-03-17
lang: en
accounts:
  "2": ~/.claude2
  main: ~/.claude
  -aly: ~/.claude-aly
  -unango: ~/.claude-unango
roles:
  strategist:
    type: worker
    loop_interval: 15m
    account: -unango
    scope:
      - .evomesh/roles/
      - experiments/
      - knowledge/
      - PLAYBOOK.md
      - memory/
    description: >
      Strategy and experiment design. Never trains or generates data directly.
      Reads leaderboard + scoring algorithm + eval results → designs experiments
      (one variable each) → writes experiment YAML → writes directives into
      Trainer/Data ROLE.md adversarial sections. Owns gap analysis. Approves or
      rejects training launches.
    idle_policy: ignore
  trainer:
    type: worker
    loop_interval: 15m
    account: -unango
    scope:
      - .evomesh/roles/trainer/
      - forge/training/
      - forge/compute/
      - forge/monitoring/
      - scripts/eval_envs.py
      - experiments/
      - knowledge/
      - memory/
    description: >
      Training execution and evaluation. Follows Strategist's experiment
      designs. Launches training, monitors loss, merges LoRA, deploys sglang,
      runs eval. Reports results back to experiments/*.yaml. Writes pushback in
      own ROLE.md adversarial section for Strategist to read.
    idle_policy: ignore
  data:
    type: worker
    loop_interval: 15m
    account: -unango
    scope:
      - .evomesh/roles/data/
      - forge/data/
      - scripts/
      - synth_config.json
      - knowledge/
      - logs/
      - memory/
    description: >
      Data generation and curation. Follows Strategist's data directives.
      Generates synthetic data, extracts from DDB, validates format, uploads to
      HF. Writes quality concerns in own ROLE.md adversarial section for
      Strategist to read. Owns canonical data and format validation.
    idle_policy: ignore
  data-game:
    type: worker
    loop_interval: 10m
    account: -aly
    scope:
      - .evomesh/roles/data-game/
      - scripts/game_bot_gen.py
      - scripts/game_bots.py
      - scripts/game_gen.py
      - scripts/game_strategy_inject.py
      - scripts/game_data_clean.py
      - scripts/game_think_regen.py
      - knowledge/environments/GAME.md
      - data/
      - memory/
    description: >
      GAME environment data specialist. Focuses on 7 active eval games. Designs
      programmatic bots with winning strategies, generates training data from
      bot vs opponent games, quality-tiers entries (HIGH/MEDIUM/LOW), and sends
      completed batches to Data Agent for canonical merge.
    idle_policy: ignore
  data-qqr:
    type: worker
    loop_interval: 10m
    account: "2"
    scope:
      - .evomesh/roles/data-qqr/
      - scripts/
      - knowledge/environments/NAVWORLD.md
      - data/
      - memory/
    description: >
      NAVWORLD environment data specialist. Generates travel planning data using
      GPT-5.4 + real AMap API. Manages QQR scoring, 7 problem types coverage,
      and plan quality. Sends batches to Data Agent for canonical merge.
    idle_policy: ignore
  data-swe:
    type: worker
    loop_interval: 10m
    account: main
    scope:
      - .evomesh/roles/data-swe/
      - scripts/
      - knowledge/environments/SWE-INFINITE.md
      - forge/data/
      - data/
      - memory/
    description: >
      SWE-Infinite environment data specialist. Builds SWE data pipeline from
      GitHub PRs via affine-swe-infinite. Collects fix trajectories from strong
      models for training. Sends batches to Data Agent for canonical merge.
    idle_policy: ignore
git:
  branch: main
  auto_push: true

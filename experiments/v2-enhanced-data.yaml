# v2 — Recovered GAME Data + seq=8192
# Based on Data agent's corrected analysis:
#   - GAME eval only tests 7 games (system_config.json dataset_range)
#   - blackjack/euchre/hearts/bridge are NOT evaluated — removed from data
#   - Recovered 854 valid entries from HF game_v7_clean.jsonl (active games only)

version: v2
variable: "GAME data recovery (1415→2269, 7 active games) + seq_len 4096→8192"
hypothesis: >
  (a) GAME: recovered 854 distillation entries from HF for the 7 eval-active games.
      Key gains: goofspiel 273→921, leduc_poker 47→332. Zero-tier dropped to 29%.
      Expected: GAME 25-35 (vs v1 estimate ~15-20 with DDB-only).
  (b) seq=8192: unlocks 49% of SWE-SYNTH entries fitting fully (vs 3.1% at 4096).
  NAVWORLD unchanged (SFT plateau, DPO deferred to v3).
control: "Qwen3-32B base model (no fine-tuning)"
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Per-game GAME breakdown (7 active games).
  Success: GAME ≥25, NAVWORLD ≥5, all 6 envs non-zero on-chain.

data_mix:
  GAME: 2269       # 7 active games ONLY (per system_config.json dataset_range [[0,500M],[600M,800M]])
  # goofspiel: 921 (Solved, idx=0)
  # gin_rummy: 358 (Bot-improved, idx=3)
  # liars_dice: 333 (Zero-tier, idx=1)
  # leduc_poker: 332 (Strong, idx=2)
  # hex: 190 (Zero-tier, idx=6)
  # clobber: 123 (Zero-tier, idx=7)
  # othello: 12 (Zero-tier, idx=4)
  # NOT included: blackjack, euchre, hearts, bridge, phantom_ttt (idx≥8, outside eval range)
  NAVWORLD: 2248   # unchanged
  SWE-SYNTH: 983   # unchanged (49% fit at seq=8192 vs 3.1% at 4096)
  LIVEWEB: 18      # safety net
  LGC-v2: 1500     # maintain coverage
  PRINT: 1500       # maintain coverage
  # Total: 8518 samples across 6 environments

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192      # CHANGED: unlocks SWE-SYNTH
  packing: true

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4

blockers: []

status: approved

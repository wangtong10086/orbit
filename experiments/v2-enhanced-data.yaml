# v2 — Enhanced Data + seq=8192
# Major GAME data recovery (+1245 entries) + sequence length unlock for SWE-SYNTH
# Replaces v1 as the real baseline (v1 had incomplete GAME data)

version: v2
variable: "GAME data recovery (1415→2660) + seq_len 4096→8192"
hypothesis: >
  Two synergistic improvements:
  (a) GAME: recovered 1447 entries from HF v7_clean (distillation data), including
      384 blackjack (new Strong-tier) and leduc_poker 47→332. Zero-tier share
      dropped from 47% to 24.8%. Expected: GAME 25-35 (vs v1 ~15-20 estimate).
  (b) seq=8192: unlocks 49% of SWE-SYNTH entries fitting fully (vs 3.1% at 4096).
      Expected: SWE-SYNTH meaningful improvement over truncated v1.
  Combined with existing strengths in LGC-v2/PRINT/LIVEWEB, this should establish
  a competitive baseline for leaderboard placement.
control: "Qwen3-32B base model (no fine-tuning)"
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Per-game GAME breakdown using `game` metadata field.
  Success: GAME ≥25, NAVWORLD ≥5, pipeline validates.
  LGC-v2/PRINT/SWE-SYNTH/LIVEWEB evaluated on-chain after deployment.

data_mix:
  GAME: 2660       # recovered: goofspiel 921, blackjack 384, gin_rummy 358, liars_dice 333, leduc_poker 332, hex 190, clobber 123, othello 12, euchre 4, phantom_ttt 3
  NAVWORLD: 2248   # same as v1
  SWE-SYNTH: 983   # same as v1 (but 49% fit fully at seq=8192 vs 3.1% at 4096)
  LIVEWEB: 18      # same as v1
  LGC-v2: 1500     # same as v1
  PRINT: 1500       # same as v1
  # Total: 8909 samples across 6 environments (+1245 from v1's 7664)

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192      # CHANGED: was 4096 in v1 — unlocks SWE-SYNTH
  packing: true

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4

blockers: []
  # All resolved:
  # - GAME data recovered from HF (2660 entries, 10 games, quality audit passed)
  # - affinetes cloned to repos/
  # - OpenSpiel installed in venv
  # - seq=8192 VRAM: ~90GB/GPU estimated, H200 has 144GB — should fit

status: approved

# v2 — 4-env Focused Training (GAME/NAVWORLD/SWE-SYNTH/LIVEWEB)
# GAME data recovered + bot data generated + seq=8192 for SWE-SYNTH

version: v2
variable: "4-env focused training with recovered GAME data (2641) + seq_len 8192"
hypothesis: >
  Training on the 4 active environments with recovered GAME data (2641 entries,
  7 active games) and seq=8192 (unlocks 49% SWE-SYNTH) establishes our baseline.
  Expected: GAME 25-35, NAVWORLD 5-8, SWE-SYNTH 10-25, LIVEWEB 15-24.
control: "Qwen3-32B base model (no fine-tuning)"
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Per-game GAME breakdown (7 active games).
  Success: GAME ≥25, all 4 envs non-zero on-chain.
  Phase 2 target: 4-env GM ≥20.
  If GM <20 → iterate v2a, v2b... until target met before moving to Phase 3.

data_mix:
  GAME: 2641       # 7 active games, includes bot expansion
  NAVWORLD: 2248   # SFT plateau confirmed
  SWE-SYNTH: 983   # 49% fit at seq=8192
  LIVEWEB: 18      # safety net
  # Total: 5890 samples across 4 environments

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192
  packing: true

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4

blockers: []


# v2 — 4-env Training (GAME/NAVWORLD/SWE-SYNTH/LIVEWEB)
# LGC-v2 and PRINT are NOT active leaderboard environments — excluded from training.
# GAME data recovered + bot data generated + seq=8192 for SWE-SYNTH

version: v2
variable: "4-env focused training with recovered GAME data (2416) + seq_len 8192"
hypothesis: >
  Training on only the 4 active leaderboard environments (dropping LGC-v2/PRINT)
  focuses all training capacity on environments that matter for scoring.
  GAME: recovered distillation data + 147 bot entries (2416 total, 7 active games).
  seq=8192: unlocks 49% SWE-SYNTH fitting fully.
  Expected: GAME 25-35, NAVWORLD 5-8, SWE-SYNTH 10-25, LIVEWEB 15-24.
control: "Qwen3-32B base model (no fine-tuning)"
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Per-game GAME breakdown (7 active games).
  Success: GAME ≥25, all 4 envs non-zero on-chain.
  Phase 2 target: GM ≥30 across 4 envs.
  If GM <30 → iterate v2a, v2b... until target met before moving to Phase 3.

data_mix:
  GAME: 2416       # 7 active games: goofspiel 921, gin_rummy 505, liars_dice 333, leduc_poker 332, hex 190, clobber 123, othello 12
  NAVWORLD: 2248   # unchanged, SFT plateau confirmed
  SWE-SYNTH: 983   # unchanged, 49% fit at seq=8192
  LIVEWEB: 18      # safety net (we already lead competitors at ~24)
  # LGC-v2: EXCLUDED — not an active leaderboard environment
  # PRINT: EXCLUDED — not an active leaderboard environment
  # Total: 5665 samples across 4 environments

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192
  packing: true

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4

blockers: []

status: approved

# Phase 2 iteration protocol:
#   v2 → eval → if GM <30 → diagnose weakest env → v2a (fix) → eval → repeat
#   Only advance to Phase 3 (DPO) when GM ≥30

# 4-env GM calculation:
# affshoot #1: (50.75 × 16.75 × 56.84 × 19.36)^(1/4) ≈ 31.4
# Our target:  (30 × 8 × 20 × 22)^(1/4) ≈ 18.1 (conservative)
# Our stretch: (35 × 10 × 25 × 24)^(1/4) ≈ 21.7 (optimistic)
# Note: 4-env GM heavily punishes NAVWORLD weakness (5.7)

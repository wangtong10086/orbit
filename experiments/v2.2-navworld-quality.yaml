id: v2.2-navworld-quality
variable: NAVWORLD quality (Claude Sonnet + QQR filter) + seq=16384 + 4-GPU DDP
hypothesis: "Three improvements over v2.1: 1. NAVWORLD data quality: v2.1 had ~400\
  \ D8 entries scoring 0 on QQR. Replaced with\n   341 Claude Sonnet entries scoring\
  \ 40-46/100. Net quality dramatically higher.\n2. seq=16384: SWE-SYNTH coverage\
  \ jumps from 29.3% → 93.2% (289 → 916 usable entries).\n   All envs benefit from\
  \ seeing full context.\n3. 4-GPU DDP: v2.1 wasted 3/4 GPUs. 4xH200 DDP = ~4x throughput,\
  \ enables seq=16384. Expected: NAVWORLD 12-20, GAME ≥45, SWE-SYNTH 15-30 (vs v2.1\
  \ ~10), 4-env GM ≥22."

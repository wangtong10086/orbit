# v2.1 — Comprehensive data quality fix (D7 + D8 + LIVEWEB restore + schema)
# Single run with all data improvements. Replaces v2 (broken data).

version: v2.1
variable: "all data quality fixes: D7 gin_rummy (+275), D8 NAVWORLD diversity (+~400), LIVEWEB restore (18→347), schema normalization"
hypothesis: >
  v2 data had multiple defects: broken gin_rummy thinking, 5-template NAVWORLD ceiling,
  only 18 LIVEWEB entries, and schema mismatch.
  D8 adds 8 diverse Chinese query types → NAVWORLD should break SFT ceiling from ~5.7 to 8-15.
  D7 adds 275 quality gin_rummy entries → GAME gin_rummy component improves.
  LIVEWEB 347 entries (vs 18) → meaningful LIVEWEB signal.
  Expected: GAME 25-35, NAVWORLD 8-15, SWE-SYNTH 10-25, LIVEWEB 18-24.
control: "Same hyperparams as v2 (lr=1e-4, lora_r=64, seq=8192, epochs=1). Only data changes."
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Per-game GAME breakdown (7 games, esp. gin_rummy).
  NAVWORLD: compare vs v11 baseline (5.7). Must show improvement if diversity hypothesis is correct.
  Success: GAME ≥25, NAVWORLD ≥8, 4-env GM ≥17.
  If GM <20 → v2.2 (diagnose weakest env, targeted fix).

data_mix:
  GAME: 2916       # canonical (D7 gin_rummy +275 HIGH merged)
  NAVWORLD: 2645   # 2248 + 397 D8 Phase 1 (8 diverse Chinese query types, 13 tool-call sequences)
  SWE-SYNTH: 983   # canonical, clean
  LIVEWEB: 347     # restored (347/437 fit seq=8192)
  # Total: 6891 samples, 4 environments

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192
  packing: true
  save_steps: 50

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4
  tool_call_parser: qwen25

blockers: []


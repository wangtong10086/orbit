# v2.1 — D7 gin_rummy fix + schema normalization
# Replaces v2 (stopped at step ~10/243 — old data with broken gin_rummy + schema issues)
# Uses current canonical data. D8 NAVWORLD diversity reserved for v2.2.

version: v2.1
variable: "D7 gin_rummy fix (+275 HIGH entries) + schema normalization (role+content only)"
hypothesis: >
  v2 data had gin_rummy with broken single-template thinking and schema mismatch (tool_calls fields).
  D7 adds 275 quality gin_rummy entries with card-aware thinking → GAME gin_rummy component should improve.
  Schema normalization eliminates data loading issues.
  NAVWORLD still uses 5-template data (diversity fix deferred to v2.2).
  Expected: GAME 25-35, NAVWORLD 5-8 (baseline confirmation), SWE-SYNTH 10-25, LIVEWEB 15-22.
control: "Same hyperparams as v2 (lr=1e-4, lora_r=64, seq=8192, epochs=1). Only data changes."
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Per-game GAME breakdown (7 active games, esp. gin_rummy before/after).
  NAVWORLD: confirm SFT ceiling (~5.7) with clean schema data.
  Success: GAME ≥25.
  If NAVWORLD still ~5-8 → confirms diversity is the bottleneck → v2.2 with D8 data.

data_mix:
  GAME: 2916       # canonical (includes D7 gin_rummy +275 HIGH)
  NAVWORLD: 2248   # canonical, schema normalized (role+content only)
  SWE-SYNTH: 983   # canonical, clean (no think tags)
  LIVEWEB: 18      # safety net
  # Total: 6165 samples, 4 environments
  # Key changes vs v2:
  #   GAME: 2641→2916 (+275 D7 gin_rummy HIGH with card-aware thinking)
  #   Schema: all (role, content) only — tool_calls flattened to <tool_call> tags
  #   NAVWORLD: same 2248 entries but schema normalized

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192
  packing: true
  save_steps: 50

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4
  tool_call_parser: qwen25  # fallback to hermes if NAVWORLD=0

blockers: []  # All data ready in canonical, schema normalized, HF synced

status: approved  # Trainer: launch immediately. Machine is idle.

# Phase 2 iteration protocol:
#   v2.1 (current) → eval → diagnose
#   v2.2: add D8 NAVWORLD diversity (+400 entries, 8 query types) as isolated variable
#   Continue until 4-env GM ≥20, then Phase 3

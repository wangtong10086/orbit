# v2.1 — D7 gin_rummy fix + LIVEWEB restore + schema normalization
# Replaces v2 (stopped — old data with broken gin_rummy + only 18 LIVEWEB + schema issues)

version: v2.1
variable: "D7 gin_rummy fix (+275 HIGH), LIVEWEB restore (18→347), schema normalization"
hypothesis: >
  v2 data had gin_rummy with broken thinking, only 18 LIVEWEB entries, and schema mismatch.
  D7 adds 275 quality gin_rummy entries → GAME gin_rummy component improves.
  LIVEWEB 347 entries (vs 18) → LIVEWEB should improve significantly (was ~15-20 with 18).
  Schema normalization eliminates data loading issues.
  Expected: GAME 25-35, NAVWORLD 5-8 (baseline), SWE-SYNTH 10-25, LIVEWEB 18-24.
control: "Same hyperparams as v2 (lr=1e-4, lora_r=64, seq=8192, epochs=1). Only data changes."
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Per-game GAME breakdown (7 games, esp. gin_rummy).
  NAVWORLD: confirm SFT ceiling (~5.7). If still ~5-8 → v2.2 with D8 diversity.
  Success: GAME ≥25, LIVEWEB improved over historical.

data_mix:
  GAME: 2916       # canonical (D7 gin_rummy +275 HIGH merged)
  NAVWORLD: 2248   # canonical, schema normalized
  SWE-SYNTH: 983   # canonical, clean
  LIVEWEB: 347     # restored from 18 (v7 data, 347/437 fit seq=8192)
  # Total: 6494 samples, 4 environments

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192
  packing: true
  save_steps: 50

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4
  tool_call_parser: qwen25

blockers: []

status: approved  # Trainer: launch immediately with latest canonical data

# v2.2: add D8 NAVWORLD diversity (+400) as isolated variable

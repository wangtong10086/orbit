# v2.11 — Remove SWE-I: isolate SWE-I poisoning hypothesis
# STATUS: drafting (pending v2.10 final results)
# Updated: 2026-03-22 03:32 UTC

version: v2.11
status: drafting

variable: "Remove SWE-INFINITE data (215 → 0)"
hypothesis: >
  v2.10 regressed on ALL envs vs v2.7 (GAME -47%, NW -16%, LW -42%).
  v2.10 changed 4 things vs v2.7: GAME 4405→5888, NW buggy→V5, LW 438→484, SWE-I 0→215.

  SWE-I is the primary suspect because:
  (1) It's the ONLY new data type (v2.7 had zero SWE-I)
  (2) Only 5% fix rate — low quality coding trajectories
  (3) 215 entries (2.7% of mix) but radically different task format
  (4) Could confuse SFT instruction-following signal

  Removing SWE-I should restore performance closer to v2.7 levels.
  If GAME/LW recover but NW stays low → NW V5 data is also problematic.
  If all recover → SWE-I confirmed as poison, exclude until quality improves.

  Expected: GAME ≥25, NAVWORLD ≥12, LIVEWEB ≥12.

control: "v2.10 (same config minus SWE-I)"

data_mix:
  GAME: 5888          # current canonical (same as v2.10)
  NAVWORLD: 1471      # V5 canonical (latest, +41 vs v2.10's 1430)
  LIVEWEB: 528        # latest canonical (+44 vs v2.10's 484)
  SWE-INFINITE: 0     # REMOVED — the single variable
  # Total: ~7887

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 5e-5             # confirmed best
  lora_r: 64
  lora_alpha: 128
  epochs: 1            # confirmed best (epochs=2 overfits)
  batch_size: 2
  grad_accum: 2
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192
  packing: true
  save_steps: 50
  num_gpus: auto
  ddp: true

eval_plan:
  environments: [GAME, NAVWORLD, LIVEWEB]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4
  tool_call_parser: qwen25
  MUST_SET: "source /root/.env before eval — CHUTES_API_KEY required for full NAVWORLD scoring"

blockers:
  - "v2.10 final results (confirm regression pattern holds at 100 samples)"

machine: TBD

notes: >
  If v2.11 still regresses vs v2.7, the problem isn't SWE-I alone.
  Next suspect: GAME data increase (4405→5888) includes 1483 additional
  entries that may differ in quality. Would need v2.12 to test
  GAME data volume isolation (5888 vs 4405 with NW V5, no SWE-I).

id: v2.11-more-data
variable: Remove SWE-INFINITE data (215 → 0)
hypothesis: 'v2.10 regressed on ALL envs vs v2.7 (GAME -13.8%, NW -11.7%, LW -12.2%).
  v2.10 changed 4 things vs v2.7: GAME 4405→5888, NW buggy→V5, LW 438→484, SWE-I 0→215.

  SWE-I is the primary suspect because: (1) It''s the ONLY new data type (v2.7 had
  zero SWE-I) (2) Only 5% fix rate — low quality coding trajectories (3) 215 entries
  (2.7% of mix) but radically different task format (4) Could confuse SFT instruction-following
  signal

  Removing SWE-I should restore performance closer to v2.7 levels. If GAME/LW recover
  but NW stays low → NW V5 data is also problematic. If all recover → SWE-I confirmed
  as poison, exclude until quality improves.

  Expected: GAME ≥25, NAVWORLD ≥12, LIVEWEB ≥12.'

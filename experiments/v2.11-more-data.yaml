data_mix:
  GAME: 5888          # current canonical (unchanged from v2.10)
  NAVWORLD: 1471      # V5 canonical (latest, +41 vs v2.10)
  LIVEWEB: 528        # latest canonical (+44 vs v2.10)
  SWE-INFINITE: 39    # canonical only (Docker-verified)
  # Total: ~7926

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 5e-5             # confirmed best
  lora_r: 64
  lora_alpha: 128
  epochs: 1            # confirmed best (epochs=2 overfits)
  batch_size: 2
  grad_accum: 2
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192
  packing: true
  save_steps: 50
  num_gpus: auto
  ddp: true


  v2.10 tests NW V5 format fixes (1430 entries). v2.11 adds incremental growth:
  - LIVEWEB: 528 (+44, mostly HN round 2) — LW is closest to competitors (gap=3.1)
  - NAVWORLD: 1471 (+41 incremental V5)

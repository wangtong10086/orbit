id: v2.9-game-cleaned
variable: GAME data quality — v10 cleaned (2260, only scoring games) vs v2.7 (4405,
  includes zero-score games)
hypothesis: 'GAME v10 removes all zero-score game data (liars_dice/othello/hex/clobber
  removed, gin_rummy kept for proven 42% eval score). v2.7 trained on 4405 GAME entries
  including ~2000 entries from games that never score. These conflicting signals may
  hurt GAME performance. Removing them should improve GAME from 28.90 to 30+ while
  maintaining or improving NAVWORLD/LIVEWEB (less noise in the mix).

  Data mix change: GAME 4405→2260 (-2145), total 6204→4572 (-1632). Fewer samples
  but higher signal-to-noise ratio.'

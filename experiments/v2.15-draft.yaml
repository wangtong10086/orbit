id: v2.15-draft
variable: Add more LW data (979 vs v2.13b's 754) without cutting GAME
hypothesis: 'v2.13b: GAME 4462 (65%) + NW 1636 (24%) + LW 754 (11%) = 6852. GM 17.7.
  v2.14: GAME 3300 (56%) + NW 1693 (29%) + LW 894 (15%) = 5887. GM ~13.7.

  v2.14 proved: cutting GAME destroys NW (6.78 vs 25.13). LW recovered (13.97). v2.13b
  proved: full GAME gives best NW (25.13) but LW suffers (7.79).

  v2.15 keeps v2.13b''s GAME count (4462) + latest NW (1700) + ALL LW (979). More
  LW (+225 entries, +30%) should recover LW from 7.79 toward 12+ without cutting GAME
  and risking NW collapse.

  Expected: GAME ~28, NW ~24 (retain v2.13b level), LW ~12-14 (recover). GM target:
  (28 × 24 × 13)^(1/3) ≈ 20.9 — significant improvement.'

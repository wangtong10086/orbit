version: v2.21
status: approved

variable: "GAME v7 system prompt alignment (eval-matching prompt + think in assistant)"
hypothesis: >
  v2.20 GAME think rate was 0% because training system prompt said "think in <think>"
  but eval prompt said "ONLY output action ID". Model obeyed eval prompt → no think.
  v7 fix: training system prompt now matches eval exactly ("only action ID"),
  but assistant responses still contain <think> blocks.
  Model should learn: "even when told to only output numbers, think first".
  Eval strip_think_tags=True handles this.
  Expected: GAME think rate 0%→high, GAME score 28→32+, NW maintains via cross-training.
  CRITICAL: merge from numbered checkpoint (not final) to avoid save corruption.

data_mix:
  GAME: 9088           # v6 MCTS-stats (unchanged)
  NAVWORLD: 1768       # unchanged
  LIVEWEB: 2627        # Teacher v10 refreshed (+282 vs v2.20)
  SWE-INFINITE: 685    # +56 vs v2.20
  total: 14168

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 5e-5
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 2
  seq_len: 8192
  packing: true
  num_gpus: auto
  ddp: true
  save_steps: 50

eval_plan:
  environments: [GAME, NAVWORLD, LIVEWEB, SWE-INFINITE]
  samples_per_env: 100
  MUST_SET: "export AMAP_MAPS_API_KEY and AMAP_API_KEY"
  MUST_DO: "Merge from NUMBERED checkpoint. Sanity test. Incremental eval saves. 4 envs."

# STABILITY PROTOCOL:
# Merge from last numbered checkpoint (e.g., checkpoint-450), NOT final.
# Sanity test immediately after merge.
# Save eval results incrementally per task.

blockers: []
machine: m1

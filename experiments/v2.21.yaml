id: v2.21
variable: GAME v7 system prompt alignment (eval-matching prompt + think in assistant)
hypothesis: 'v2.20 GAME think rate was 0% because training system prompt said "think
  in <think>" but eval prompt said "ONLY output action ID". Model obeyed eval prompt
  → no think. v7 fix: training system prompt now matches eval exactly ("only action
  ID"), but assistant responses still contain <think> blocks. Model should learn:
  "even when told to only output numbers, think first". Eval strip_think_tags=True
  handles this. Expected: GAME think rate 0%→high, GAME score 28→32+, NW maintains
  via cross-training. CRITICAL: merge from numbered checkpoint (not final) to avoid
  save corruption.'

id: v2.8-lr-tuned
variable: 'epochs=2 + lr=7e-5: double training volume to match v2.1''s convergence'
hypothesis: 'Training intensity analysis reveals v2.1 (loss 0.156, NW 8.47) processed
  56.4M tokens in ~430 steps, while v2.6/v2.7 only processed 35.1M tokens in 268 steps
  (38% less). This under-training explains why v2.6 loss=0.301 and v2.7 loss=0.243
  — they never converged to v2.1''s 0.156 level.

  v2.8 doubles training with epochs=2 (~536 steps, ~70M tokens). lr=7e-5 (between
  1e-4 and 5e-5) prevents overfitting with 2 epochs. Expected: loss <0.20, NAVWORLD
  10-15, GAME ≥26.'

id: v2.16-draft
variable: GAME v12 system prompt fix (think-then-act instead of suppress-thinking)
hypothesis: 'CRITICAL FIX: data-game discovered v2.13b/v2.15 model produced 0 think
  blocks across all 1157 GAME outputs. Root cause: system prompt said "respond with
  ONLY the action ID, do NOT include descriptions or explanations" — contradicting
  the <think> blocks in training data.

  v12 fix: system prompt changed to "First, think through your strategy step by step
  inside <think> tags. Then, output ONLY the action ID number on a new line." eval
  uses strip_think_tags=True so think blocks auto-stripped.

  This should unlock reasoning for spatial games (othello/hex/clobber = currently
  0%) and improve all environments through better reasoning capability.

  Expected: GAME 35+ (spatial games start scoring), NW 25+ (reasoning helps NW), LW
  12+ (reasoning helps multi-step tasks).'
status: completed
train_config:
  model: unsloth/Qwen3-32B-bnb-4bit
  learning_rate: 5e-5
  lora_rank: 64
  lora_alpha: 128
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2
  max_length: 8192
  packing: true
  num_gpus: 1
  output_dir: /tmp/checkpoints
data_config:
  GAME:
    count: ALL canonical v12
  NAVWORLD:
    count: ALL canonical
  LIVEWEB:
    count: ALL canonical
  SWE-INFINITE:
    count: 0
results:
  training_run: null
  evaluation_run: null
  collect_run: null
  agent_eval: null
  extra:
    version: v2.16
    control: v2.13b (GAME v11 with suppress-thinking system prompt)
    data_mix:
      GAME: ALL canonical v12
      NAVWORLD: ALL canonical
      LIVEWEB: ALL canonical
      SWE-INFINITE: 0
    config:
      base_model: unsloth/Qwen3-32B-bnb-4bit
      method: QLoRA-SFT
      lr: 5e-5
      lora_r: 64
      lora_alpha: 128
      epochs: 1

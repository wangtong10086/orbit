id: v1-baseline
variable: pipeline validation — first train with 6-env cleaned data on new machine
hypothesis: 'Training on all 6 leaderboard environments with cleaned data should produce
  a deployable model with non-zero scores everywhere. Full coverage maximizes L6 subset
  weight (32x L1). Expected: GAME ~20-25, NAVWORLD ~5-8, LGC-v2 ~90+, PRINT ~75+.
  SWE-SYNTH/LIVEWEB scores uncertain (can''t local eval).'
status: completed
train_config:
  model: unsloth/Qwen3-32B-bnb-4bit
  learning_rate: 1e-4
  lora_rank: 64
  lora_alpha: 128
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  max_length: 4096
  packing: true
  num_gpus: 1
  output_dir: /tmp/checkpoints
data_config:
  GAME:
    count: 1415
  NAVWORLD:
    count: 2248
  SWE-SYNTH:
    count: 983
  LIVEWEB:
    count: 18
  LGC-v2:
    count: 1500
  PRINT:
    count: 1500
results:
  training_run: null
  evaluation_run: null
  collect_run: null
  agent_eval: null
  extra:
    version: v1
    control: Qwen3-32B base model (no fine-tuning)
    measurement: 'GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4). Success:
      pipeline completes, non-zero scores in GAME + NAVWORLD. LGC-v2/PRINT/SWE-SYNTH/LIVEWEB
      evaluated on-chain after deployment.'
    data_mix:
      GAME: 1415
      NAVWORLD: 2248
      SWE-SYNTH: 983
      LIVEWEB: 18
      LGC-v2: 1500
      PRINT: 1500
    config:
      base_model: unsloth/Qwen3-32B-bnb-4bit
      method: QLoRA-SFT
      lr: 1e-4
      lora_r: 64
      lora_alpha: 128
      epochs: 1
      batch_size: 2
      grad_accum: 8
      max_grad_norm: 0.3

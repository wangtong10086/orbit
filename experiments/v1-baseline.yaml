# v1 — Pipeline Validation Baseline (6-env full coverage)
# First training run. Validates pipeline + establishes baseline across ALL leaderboard envs.
# Rev3: Incorporates Data agent veto (SWE-SYNTH think tags, LIVEWEB noise)

version: v1
variable: "pipeline validation — first train with 6-env cleaned data on new machine"
hypothesis: >
  Training on all 6 leaderboard environments with cleaned data should produce a
  deployable model with non-zero scores everywhere. Full coverage maximizes L6
  subset weight (32x L1). Expected: GAME ~20-25, NAVWORLD ~5-8, LGC-v2 ~90+,
  PRINT ~75+. SWE-SYNTH/LIVEWEB scores uncertain (can't local eval).
control: "Qwen3-32B base model (no fine-tuning)"
measurement: >
  GAME 100s + NAVWORLD 100s (timeout=7200s, concurrency=4).
  Success: pipeline completes, non-zero scores in GAME + NAVWORLD.
  LGC-v2/PRINT/SWE-SYNTH/LIVEWEB evaluated on-chain after deployment.

data_mix:
  GAME: 1415       # all available (missing hearts/bridge/blackjack/euchre — addressed in v2)
  NAVWORLD: 2248   # all available
  SWE-SYNTH: 983   # cleaned: think tags removed, actual count verified 2026-03-18
  LIVEWEB: 18      # entries <16K chars (safety net for non-zero)
  LGC-v2: 1500     # subsampled from 3353
  PRINT: 1500       # subsampled from 2898
  # Total: 7664 samples across 6 leaderboard environments (verified)

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 8
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 4096
  packing: true

eval_plan:
  environments: [GAME, NAVWORLD]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4

blockers:
  - "game.jsonl + navworld.jsonl still root-owned — read OK but can't modify (USER ACTION: sudo chown)"
  # RESOLVED:
  # - "No machine provisioned" → ONLINE: 4xH200 (144GB each), 2.4T disk
  # - "Forge CLI broken" → FIXED: deps in ~/.claude-unango/venv/
  # - "SWE-SYNTH think tag cleanup" → DONE: 983 clean entries, 0 think tags (verified 2026-03-18)
  # - "LGC-v2/PRINT subsampling" → DONE: 1500 each in canonical/
  # - "LIVEWEB short entries" → DONE: 18 entries in canonical/
  # - "Stale training process" → KILLED: was zombie at 0% GPU


id: v2.14-draft
variable: Reduce GAME proportion from 65% to ~55%, increase LW to ~15%
hypothesis: 'v2.13b achieved NEW BEST GM (+3.5%) with NW +99% breakthrough but LW
  -43%. LW regression caused by GAME at 65% of mix (v2.7 optimal: GAME 59%, LW 15%).
  v2.13b had LW at only 11% (754/6852).

  v2.14 rebalances: subsample GAME to ~3300 (~55%), keep NW ~1636, LW all 754 (~13%).
  This should recover LW toward v2.7''s 13.76 while retaining GAME/NW gains from v11
  MCTS data.

  Expected: GAME ~27 (slight drop from 28.14), NW ~24 (retain), LW ~12-14 (recover).
  GM target: (27 × 24 × 13)^(1/3) ≈ 20.5 — significant improvement over v2.13b''s
  17.7.'

# v2.27 — Full fine-tuning + no think + seq 32k
# STATUS: drafting
# Created: 2026-03-27 05:30 UTC
# Updated: 2026-03-27 07:00 UTC

version: v2.27
status: drafting

variable: "Full fine-tuning (was QLoRA r=64) + GAME no-think v12 + seq 32768"
hypothesis: >
  Top miners use full fine-tuning and score ~48% GAME. We use QLoRA r=64 (0.26%
  of parameters) and score ~29%. The 380x parameter capacity gap is likely the
  core bottleneck — LoRA can't encode 7 game strategies + NW + LW + SWE-I.
  Combined with:
  - GAME v12: no think chains (matches competitors), liars call ratio fixed
  - seq_len 32768: stops truncating 80% of LW data (P50=14.7k tokens)
  - Full data with no think: pure action format across all envs
  Expected: significant GAME improvement from parameter capacity alone.
  LW improvement from seeing complete trajectories.

control: "v2.25 (QLoRA r=64, seq=8192, v10 GAME with think)"

expected_outcome:
  GAME: "35-45 — full FT capacity to learn all 7 games including spatial"
  NW: "38-42 (maintain)"
  LW: "30-38 (full trajectories seen for first time)"
  SWE-I: "3-8 (first eval)"

data_mix:
  GAME: 16575       # v12 rebalanced — no think, liars call ratio fixed
  NAVWORLD: 4402    # same
  LIVEWEB: 10799    # v20+HN — 9999 base + 800 HN diversity
  SWE-INFINITE: 1037
  total: 32813

config:
  base_model: Qwen/Qwen3-32B          # full precision, NOT bnb-4bit
  method: Full-SFT                      # NOT QLoRA
  framework: "HF Trainer + DeepSpeed ZeRO-3 (or FSDP)"  # NOT Unsloth
  lr: 2e-5                              # lower LR for full FT (standard)
  epochs: 1
  batch_size: 1                         # per-GPU, reduced for VRAM
  grad_accum: 4                         # effective batch = 1*4*4gpu = 16
  seq_len: 32768
  packing: true
  bf16: true
  num_gpus: 4                           # all H200s
  deepspeed: ZeRO-3                     # shard model+optimizer+gradients
  save_steps: 50                        # more frequent saves (fewer total steps)
  gradient_checkpointing: true          # trade compute for VRAM

eval_plan:
  environments: [GAME, NAVWORLD, LIVEWEB, SWE-INFINITE]
  samples_per_env: 100
  sglang_args: "--tool-call-parser qwen"
  NO_reasoning_parser: true
  MUST_SET: "export AMAP_MAPS_API_KEY and AMAP_API_KEY"
  MUST_DO: "Test multiple checkpoints. NO --reasoning-parser."
  MUST_EVAL_SWE: "SWE-INFINITE must be evaluated this run"

infrastructure_change:
  - "NEW training script needed: HF Trainer + DeepSpeed ZeRO-3 (Unsloth doesn't support full FT)"
  - "Model: Qwen/Qwen3-32B full weights (NOT quantized)"
  - "DeepSpeed config: ZeRO stage 3, offload optimizer to CPU if needed"
  - "Output: full model weights (NOT adapter), can merge directly"
  - "Fallback: if full FT OOMs, try LoRA r=256 as intermediate step"

known_limitations:
  - "gin_rummy: 604 entries, 55.8% knock rate (v8 had 95%) — needs regen"
  - "leduc_poker: 0% fold — needs fold examples"
  - "Training will be slower than QLoRA (more params to update)"

blockers:
  - "WAITING: User confirms data ready"
  - "NEED: Full FT training script (trainer must build)"
  - "NEED: DeepSpeed ZeRO-3 config tested on 4x H200"

machine: m1

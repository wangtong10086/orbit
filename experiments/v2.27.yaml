version: v2.27
status: drafting

variable: "v12 GAME data replacing v10 — no think chains, liars_dice call ratio fixed (41.7%→13%)"
hypothesis: >
  Two changes from v2.25 GAME data, bundled because both are format alignment:
  1. No think chains — matches top competitors who score ~48% with bare action IDs.
     v10 think chains waste model capacity (eval strips them anyway).
  2. Liars_dice call ratio fixed — v10 had 41.7% call-first (v8 was 13.4%),
     causing overbid behavior. v12 rebalances to 13%.
  Expected: scoring games maintain/improve, spatial games may break 0%.
  NW/LW unchanged. LW v20 already has NO think chains (verified: 0/9999 entries have think tags).
  v2.25 LW 27.76 was achieved WITHOUT think — pure tool_call format. More LW data (9999 vs 8816) is net gain.

control: "v2.25 (v10 GAME 9966 with think chains, 41.7% liars call ratio)"

expected_outcome:
  GAME: "28-33 — liars recovery to ~15-20% + potential spatial game breakthrough"
  NW: "38-42 (maintain — same data)"
  LW: "25-28 (maintain — v20 already has no think, +1183 entries should help)"
  SWE-I: "3-8 (first eval — 1037 training entries)"

data_mix:
  GAME: 16575       # v12 rebalanced — no think chains, fixed liars call ratio
  NAVWORLD: 4402    # same as v2.26
  LIVEWEB: 9999     # v20 — no think chains (verified 0/9999), up from 8816
  SWE-INFINITE: 1037  # upgraded from 853/973
  total: 32013

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 5e-5
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 2
  seq_len: 8192
  packing: true
  num_gpus: auto
  ddp: true
  save_steps: 100

eval_plan:
  environments: [GAME, NAVWORLD, LIVEWEB, SWE-INFINITE]
  samples_per_env: 100
  sglang_args: "--tool-call-parser qwen"
  NO_reasoning_parser: true
  MUST_SET: "export AMAP_MAPS_API_KEY and AMAP_API_KEY"
  MUST_DO: "Test ckpt-300, ckpt-400, ckpt-500. Merge best. NO --reasoning-parser."
  MUST_EVAL_SWE: "SWE-INFINITE must be evaluated this run"

known_limitations:
  - "gin_rummy: only 2.3% knock actions — needs pyspiel regen (not blocked)"
  - "leduc_poker: 0% fold in data — needs fold examples (not blocked)"
  - "spatial games: may still be 0% (SFT ceiling per data-game)"

risks:
  - "v12 is 16575 entries (vs 9966 v10) — 52% of total mix is GAME"
  - "Both GAME and LW now no-think — format consistent but untested with v12 GAME data"
  - "32013 total is largest dataset — checkpoint timing may shift"
  - "Two changes bundled (no-think + liars rebalance) — if results change can't fully isolate"

blockers:
  - "WAITING: User confirms data ready (do NOT rely on data role status alone)"
  - "WAITING: v2.26 eval must complete first (training started m2 05:56 UTC)"

machine: m1

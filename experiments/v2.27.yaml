id: v2.27
variable: Full fine-tuning (was QLoRA r=64) + GAME no-think v12 + seq 32768
hypothesis: 'Top miners use full fine-tuning and score ~48% GAME. We use QLoRA r=64
  (0.26% of parameters) and score ~29%. The 380x parameter capacity gap is likely
  the core bottleneck — LoRA can''t encode 7 game strategies + NW + LW + SWE-I. Combined
  with: - GAME v12: no think chains (matches competitors), liars call ratio fixed
  - seq_len 32768: stops truncating 80% of LW data (P50=14.7k tokens) - Full data
  with no think: pure action format across all envs Expected: significant GAME improvement
  from parameter capacity alone. LW improvement from seeing complete trajectories.'
status: draft
train_config:
  model: Qwen/Qwen3-32B
  learning_rate: 2e-5
  lora_rank: 64
  lora_alpha: 128
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2
  max_length: 32768
  packing: true
  num_gpus: 8
  output_dir: /tmp/checkpoints

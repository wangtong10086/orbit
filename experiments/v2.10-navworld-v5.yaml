id: v2.10-navworld-v5
variable: NAVWORLD V5 data — 1348 format-corrected entries replacing all prior buggy
  data
hypothesis: 'All prior NAVWORLD training data had 3 critical format mismatches vs
  eval: (1) JSON transport objects vs eval''s Chinese text strings, (2) English prompts
  vs eval''s Chinese, (3) Incomplete tool schema vs eval''s full schema.

  V5 fixes all 3, matching eval format byte-for-byte. 1348 entries, 99.8% quality.
  Expected: NAVWORLD jumps from 12.63 to 18-22 (closer to competitors at 24-29). GAME
  and LIVEWEB should hold steady (same config as v2.7).'

id: v2-swe-synth-seq8192
variable: seq_len 4096→8192 + restore GAME bot strategy data (+600 entries)
hypothesis: "Two improvements targeting different environments: (a) seq=8192 unlocks\
  \ 49% of SWE-SYNTH entries fitting fully (vs 3.1% at 4096),\n    improving SWE-SYNTH\
  \ from v1 baseline.\n(b) Adding ~600 bot strategy entries for learnable GAME games\
  \ (gin_rummy 200,\n    leduc_poker 200, goofspiel 200) restores data that made v11\
  \ achieve 22.6.\n    v1 GAME likely regressed due to missing bot data.\nCombined:\
  \ SWE-SYNTH up, GAME up, other envs stable."
status: draft
train_config:
  model: unsloth/Qwen3-32B-bnb-4bit
  learning_rate: 1e-4
  lora_rank: 64
  lora_alpha: 128
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  max_length: 8192
  packing: true
  num_gpus: 1
  output_dir: /tmp/checkpoints
data_config:
  GAME:
    count: ~1815
  NAVWORLD:
    count: 2248
  SWE-SYNTH:
    count: 983
  LIVEWEB:
    count: 18
  LGC-v2:
    count: 1500
  PRINT:
    count: 1500
results:
  training_run: null
  evaluation_run: null
  collect_run: null
  agent_eval: null
  extra:
    version: v2
    control: v1 baseline (7664 samples, seq=4096, no bot data)
    measurement: 'GAME 100s + NAVWORLD 100s (same eval config as v1). Success if:
      GAME score > v1 baseline AND SWE-SYNTH score > v1 baseline (on-chain). Per-game
      GAME breakdown to isolate bot data effect.'
    data_mix:
      GAME: ~1815
      NAVWORLD: 2248
      SWE-SYNTH: 983
      LIVEWEB: 18
      LGC-v2: 1500
      PRINT: 1500
    config:
      base_model: unsloth/Qwen3-32B-bnb-4bit
      method: QLoRA-SFT
      lr: 1e-4
      lora_r: 64
      lora_alpha: 128
      epochs: 1
      batch_size: 2
      grad_accum: 8
      max_grad_norm: 0.3

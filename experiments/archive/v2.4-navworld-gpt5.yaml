# v2.4 — Clean data: remove SWE-SYNTH + qwen-max NAVWORLD, seq=8192
# APPROVED by Strategist 2026-03-20 ~10:45 UTC
# REVISED: aggressive data cleanup based on NAVWORLD regression analysis

version: v2.4
status: completed  # v2.4a trained on m2, v2.4b on m1. Both eval complete.

variable: "Remove toxic qwen-max NAVWORLD (5-template) + deprecated SWE-SYNTH + revert seq=8192"
hypothesis: >
  NAVWORLD collapsed 8.47→6.10→1.51 across v2.1-v2.3. Root cause analysis:
  1. qwen-max 2205 entries use only 5 templates, all poi_search-heavy — teaches model to
     spam poi_search instead of using diverse tools (weather/direction/flights/trains).
  2. seq=16384 correlates with NAVWORLD decline (v2.1 at seq=8192 scored 8.47).
  3. SWE-SYNTH 983 entries are from deprecated environment — wasted training capacity.
  Fix: remove all toxic/deprecated data, revert to seq=8192, train only on high-quality data.
  Expected: NAVWORLD 8-15 (644 clean entries with diverse tool usage), GAME stable ~26,
  LIVEWEB stable ~7.5. Less data but zero noise.
control: "v2.3 (GAME 3631 + NAVWORLD 2624 + SWE-SYNTH 983 + LIVEWEB 388 = 7626, seq=16384)"
measurement: >
  Full eval: GAME 100s + NAVWORLD 100s + LIVEWEB 100s.
  Primary: NAVWORLD recovery (≥8, back to v2.1 level).
  Secondary: GAME/LIVEWEB no regression.

data_mix:
  GAME: 3918        # bot + GPT-5.4 distill (capped: liars_dice 250, leduc 300, goofspiel +156, hex +39, clobber +3)
  NAVWORLD: 919     # CLEANED: removed 2205 qwen-max templates. GPT-5.4 ~500 + Claude 341 + qwen3-max labeled 78
  SWE-SYNTH: 0      # REMOVED — environment deprecated
  LIVEWEB: 397      # cleaned historical + GPT-5.4
  # Total: 5234

navworld_cleanup:
  removed:
    - source: "qwen-max 2205 entries"
      reason: "5 repeating templates, poi_search-only tool usage, teaches bad patterns"
  kept:
    - source: "Claude Sonnet 419 entries"
      quality: "avg 39.7/50 code score, all 7 types, diverse tool usage"
    - source: "GPT-5.4 225 entries"
      quality: "V2 pipeline, ≥35/50 code score, diverse tool usage"

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2          # back to batch=2 (seq=8192 fits in VRAM)
  grad_accum: 2          # 4 GPUs × 2 × 2 = effective 16 (same as before)
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 8192          # REVERTED from 16384 — no env needs 16384, v2.1 scored best at 8192
  packing: true
  save_steps: 50
  num_gpus: auto
  ddp: true

eval_plan:
  environments: [GAME, NAVWORLD, LIVEWEB]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4
  tool_call_parser: qwen25

blockers: []

training_log:
  launched: "2026-03-20 11:30 UTC"
  machine: "m2 (wrk-2g5l02247zvp, 4xH200)"
  actual_data: 5120  # GAME 3918 + NAVWORLD 805 (no qwen-max) + LIVEWEB 397
  launcher: "torchrun --nproc_per_node=4"
  batch_size: 2
  grad_accum: 2  # 4 GPUs × 2 × 2 = effective 16
  seq_len: 8192
  note: "NAVWORLD canonical had 883 entries, filtered out 78 qwen-max → 805. GAME 3918 (data agent added more since v2.3)."

training_log_v24b:
  launched: "2026-03-20 12:55 UTC"
  machine: "m1 (wrk-quikhh8t7nyz, 4xH200)"
  actual_data: 5278  # GAME 3918 + NAVWORLD 963 + LIVEWEB 397
  seq_len: 16384
  batch_size: 1
  grad_accum: 4
  total_steps: 125
  final_loss: ~0.17
  runtime_hours: ~2.5

eval_results:
  v2.4a_seq8192:
    trained_on: m2
    hf_repo: "monokoco/affine-qwen3-32b-v2.4a"
    note: "Eval failed on m2 (sglang unstable). Pending eval on m1."
  v2.4b_seq16384:
    trained_on: m1
    hf_repo: "monokoco/affine-qwen3-32b-v2.4b"
    GAME:
      mean_score: 25.44
      samples: 100
      nonzero_rate: "41/100 (41%)"
    NAVWORLD:
      mean_score: 4.58
      samples: 100
      nonzero_rate: "28/100 (28%)"
    LIVEWEB:
      mean_score: 15.77
      samples: 56  # 44 errors (cache/API)
      nonzero_rate: "19/56 (34%)"
    summary: >
      GAME 25.44 (recovered to v2.1 level). NAVWORLD 4.58 (3x v2.3 but still below v2.1).
      LIVEWEB 15.77 (best ever, competitive with top miners).
      qwen-max removal clearly helped NAVWORLD. seq=16384 NOT the root cause of regression.

ab_test_conclusion: >
  v2.4b (seq=16384) shows NAVWORLD 4.58 — better than v2.3 (1.52) by 3x.
  This proves qwen-max data removal was the key fix, NOT seq_len.
  v2.4a (seq=8192) eval still pending for full A/B comparison.

snapshot_rule: >
  MANDATORY: Save experiment snapshot after training.
  Record: loss curve, per-env scores, per-game breakdowns, merged model checkpoint.

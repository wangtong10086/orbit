  (lower for stability)'
hypothesis: 'v2.4a (GM≈13.4) is our best model. Key learnings from 7 experiments:
  1. seq=8192 best for NAVWORLD (7.71 vs 4.58 at 16384) 2. qwen-max removal critical
  (confirmed) 3. v2.5 had loss=0.288 (abnormally high) — may need lower lr for larger
  dataset 4. v2.4a loss=0.231 was also higher than v2.4b (0.17) — seq=8192 converges
  differently

  v2.7 changes vs v2.4a: - NAVWORLD: 805 → 1633 (+103% data, all GPT-5.4/Claude) -
  LIVEWEB: 397 → 438 (+10%) - SWE-Infinite: 0 → 215 (NEW) - lr: 1e-4 → 5e-5 (lower
  for stability with more data, avoid v2.5''s high loss)

  Expected: NAVWORLD 10-14 (2x data + optimal seq), GAME ≥26, LIVEWEB ≥12.'

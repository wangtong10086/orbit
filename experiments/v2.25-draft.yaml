version: v2.25
status: drafting

variable: "GAME v9 rule-based think (replaces MCTS stats) + rebalanced mix"
hypothesis: >
  GAME v9 uses IF-THEN rule chains instead of MCTS statistics in think blocks.
  v2.23 model was quoting "Evaluated 60 options: 2-5 (52%, 358 visits)" instead of
  reasoning about game state. Rule-based think should generalize better.
  Target: GAME 35-50 (from 29.70). Spatial games 0→15-22%.
  CRITICAL: NW must stay ≥19%. If GAME=10000, cap GAME or increase NW to ~4200.

data_mix:
  GAME: 8750          # Cap at 8750 to keep NW ≥19% (data-game targeting 10000, but NW constraint)
  NAVWORLD: 3865      # Or increase to 4200 if GAME goes to 10000
  LIVEWEB: 6892       # v17c with tools fix
  SWE-INFINITE: 804   # Latest
  total: 20311        # Preliminary

# DECISION NEEDED (after v2.24 eval):
# Option A: Cap GAME at 8750, NW stays 3865 → NW 19.1%
# Option B: GAME 10000, increase NW to 4200 → NW 17.9% (BELOW threshold, risky)
# Option C: GAME 10000, NW 4200 → need data-qqr to generate 335 more NW entries

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 5e-5
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 2
  grad_accum: 2
  seq_len: 8192
  packing: true
  num_gpus: auto
  ddp: true
  save_steps: 100

eval_plan:
  environments: [GAME, NAVWORLD, LIVEWEB, SWE-INFINITE]
  samples_per_env: 100
  sglang_args: "--tool-call-parser qwen"
  NO_reasoning_parser: true

blockers:
  - "v2.24 must complete eval first"
  - "GAME v9 generation still running"
  - "NW proportion decision pending v2.24 NW result"
machine: m1

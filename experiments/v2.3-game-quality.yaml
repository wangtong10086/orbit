  \ format mismatch. v2.2 trained with\n   raw JSON → 0%. v2.3 uses correct Qwen3\
  \ <tool_call> format + <tools> system defs.\n3. LIVEWEB plugin diversity: 370 entries\
  \ across 7+ plugins (was 95% CoinGecko). Expected: GAME 35-43 (up from 26), LIVEWEB\
  \ 5-12 (up from 0)."

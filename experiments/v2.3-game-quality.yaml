hypothesis: "Three confirmed improvements over v2.2: 1. GAME v4: removed Chinese/template/no-think\
  \ entries, added quality bot data for\n   othello (541), hex (452), clobber (469).\
  \ These games have 55-79% bot win rates —\n   old zero scores were from bad data,\
  \ not SFT limitation. Score ceiling with only\n   3 learnable games = 37.1; with\

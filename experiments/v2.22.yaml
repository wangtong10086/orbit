id: v2.22
variable: NW data expansion (2966, +68% from 1768) with GAME v6 prompt restored
hypothesis: 'v2.21 achieved NW 42.84 (new best) with v7 prompt but GAME regressed
  to 24.92. v2.22 reverts GAME to v6 prompt (which scored 28.21 in v2.20) and adds
  massive NW data (+1198 entries). More NW data should maintain/improve NW even with
  v6 prompt, while v6 prompt should recover GAME to 28+ range. Expected: GAME ~28,
  NW ~40+ (more NW data compensates for v6 think dilution).'

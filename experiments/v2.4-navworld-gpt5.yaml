# v2.4 — Remove deprecated SWE-SYNTH + add GPT-5.4 NAVWORLD/LIVEWEB
# APPROVED by Strategist 2026-03-20 ~10:30 UTC

version: v2.4
status: approved

variable: "Remove SWE-SYNTH (deprecated) + add GPT-5.4 data (NAVWORLD +225, LIVEWEB +9)"
hypothesis: >
  v2.3 trained with 983 SWE-SYNTH entries from a deprecated environment — wasted capacity.
  Removing SWE-SYNTH frees training signal for effective environments.
  NAVWORLD gains 225 GPT-5.4 entries (cross-family distillation, higher quality than qwen-max).
  LIVEWEB gains 9 more GPT-5.4 entries.
  Expected: NAVWORLD slight improvement (more diverse data), LIVEWEB stable.
  GAME unchanged (zero-tier games confirmed SFT-unlearnable after 3 versions).
control: "v2.3 (GAME 3631 + NAVWORLD 2624 + SWE-SYNTH 983 + LIVEWEB 388 = 7626)"
measurement: >
  Full eval: GAME 100s + NAVWORLD 100s + LIVEWEB 100s (no SWE-SYNTH).
  Key: NAVWORLD improvement from +225 GPT-5.4 entries.
  Success: NAVWORLD ≥8 (back to v2.1 level) + no regression on GAME/LIVEWEB.

data_mix:
  GAME: 3631        # unchanged — bot strategies, zero-tier SFT-unlearnable
  NAVWORLD: 2849    # +225 GPT-5.4 (was 2624 in v2.3)
  SWE-SYNTH: 0      # REMOVED — environment deprecated, replaced by SWE-Infinite
  LIVEWEB: 397      # +9 GPT-5.4 (was 388 in v2.3)
  # Total: 6877 (was 7626 in v2.3, -749 from SWE-SYNTH removal)

config:
  base_model: unsloth/Qwen3-32B-bnb-4bit
  method: QLoRA-SFT
  lr: 1e-4
  lora_r: 64
  lora_alpha: 128
  epochs: 1
  batch_size: 1
  grad_accum: 4
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  weight_decay: 0.01
  seq_len: 16384
  packing: true
  save_steps: 50
  num_gpus: auto
  ddp: true

eval_plan:
  environments: [GAME, NAVWORLD, LIVEWEB]
  samples_per_env: 100
  timeout: 7200
  concurrency: 4
  tool_call_parser: qwen25

blockers: []

snapshot_rule: >
  MANDATORY: Save experiment snapshot after each training run.
  - Upload merged model to HF (private)
  - Record final loss, per-env scores, per-game breakdowns in this YAML
  - Keep checkpoint-final on rental machine until next training overwrites
  - Record in experiments/results.tsv

# v2.3 results (when complete) for comparison:
# LIVEWEB: 7.50 (100s, 13 errors, marginal +0.67 from v2.2)
# NAVWORLD: pending (~6, same data as v2.2)
# GAME: pending (zero-tier still 0, same 3 games scoring)
#
# Key finding: GAME zero-tier games (clobber/hex/othello/liars_dice) are
# SFT-unlearnable after 3 versions (v2.1/v2.2/v2.3). Escalate to GRPO in Phase 3.

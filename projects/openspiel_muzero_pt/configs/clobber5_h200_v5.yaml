# Clobber 5x6 — v5 convergence stabilization
#
# Changes vs v4:
#   1. Gated snapshot: search_model only updates when eval WR improves
#      (prevents non-stationary self-play from poisoning replay)
#   2. Teacher KL anchor: continuous KL distillation on expert positions
#      (keeps model anchored to MCTS teacher policy throughout training)
#   3. Lower update/data ratio: fewer SGD steps per self-play game,
#      lower LR, larger snapshot_sync_interval
#      (avoids overfitting on narrow self-play distribution)

game:
  family: clobber
  task_ids: [700000000]

model:
  channels: 128
  repr_blocks: 10
  dyn_blocks: 4
  head_hidden: 256
  unroll_steps: 3

search:
  algorithm: gumbel_muzero
  train_num_simulations: 64
  reanalyse_num_simulations: 64
  eval_num_simulations: 128
  c_puct: 1.5
  root_dirichlet_epsilon: 0.25
  max_num_considered_actions: 32

optimizer:
  name: adamw
  fused: true
  lr_warmstart: 5.0e-4
  lr_online: 5.0e-5            # halved vs v4: less aggressive SGD
  lr_finetune: 2.5e-5
  lr_warmup_steps: 2000
  lr_min_ratio: 0.1
  weight_decay: 1.0e-4
  grad_clip: 1.0

train:
  batch_size_per_gpu: 128
  replay_ratio:
    live: 0.5
    expert: 0.5
  ema_decay: 0.999
  precision: bf16
  compile: false
  learner_steps_warmstart: 50000
  learner_steps_online: 2000000
  checkpoint_interval: 10000
  eval_interval: 10000
  log_interval: 100
  auto_official_eval: false
  stop_on_convergence: true
  recency_bias: 0.0
  expert_decay_steps: 0        # no expert decay — teacher stays permanently
  expert_min_ratio: 0.5
  gated_snapshot: true          # NEW: only sync search_model on eval improvement
  teacher_kl_weight: 0.5        # NEW: continuous KL anchor to MCTS teacher

actors:
  workers: 8
  active_games_per_actor: 16
  chunk_flush_games: 8
  chunk_flush_seconds: 1.0
  result_queue_size: 24
  result_queue_slots: 3

runtime:
  gpu_coordinator:
    snapshot_sync_interval: 500  # wider window before eligible for gated sync
    initial_max_batch_items: 4096
    recurrent_max_batch_items: 8192
    initial_max_wait_ms: 5.0
    recurrent_max_wait_ms: 5.0
    train_microbatch_size: 128
    max_train_microbatches_per_turn: 1
    inference_low_watermark: 32

buffers:
  expert_states: 4096
  live_capacity: 300000

corpus:
  cheap_games: 512
  sample_states: 4096
  weak_mcts_simulations: 16
  num_workers: 0

expert:
  label_simulations: 128
  label_rollouts: 16
  strong_simulation_scale: 2
  strong_fraction: 0.25
  num_workers: 0

eval:
  quick_games: 200
  quick_num_workers: 8
  quick_agent_simulations: 64
  quick_baseline_simulations: 64
  quick_baseline_rollouts: 4
  official_games: 1000
  official_num_workers: 8
  official_agent_simulations: 128
  official_baseline_simulations: 1500
  official_baseline_rollouts: 100
  quick_gate_games: 200
  quick_threshold_for_official: 0.90
  convergence_games: 200
  convergence_consecutive_passes: 2
  acceptance_target_winrate: 0.90

game:
  family: othello
  task_ids: [400000000]

model:
  channels: 64
  repr_blocks: 2
  dyn_blocks: 1
  head_hidden: 128
  unroll_steps: 2

search:
  algorithm: gumbel_muzero
  train_num_simulations: 8
  reanalyse_num_simulations: 16
  eval_num_simulations: 16
  c_puct: 1.5
  root_dirichlet_epsilon: 0.25
  max_num_considered_actions: 16

optimizer:
  name: adamw
  fused: false
  lr_warmstart: 1.0e-3
  lr_online: 5.0e-4
  lr_finetune: 2.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0

train:
  batch_size_per_gpu: 64
  replay_ratio:
    live: 0.6
    expert: 0.4
  ema_decay: 0.999
  precision: fp32
  compile: false
  learner_steps_warmstart: 20
  learner_steps_online: 20
  checkpoint_interval: 5
  eval_interval: 10
  log_interval: 1
  auto_official_eval: false

actors:
  workers: 1
  parallel_games_per_actor: 4
  games_per_chunk: 4
  result_queue_size: 4

runtime:
  gpu_coordinator:
    snapshot_sync_interval: 20
    initial_max_batch_items: 512
    recurrent_max_batch_items: 1024
    initial_max_wait_ms: 1.0
    recurrent_max_wait_ms: 1.0

buffers:
  expert_states: 128
  live_capacity: 4096

corpus:
  cheap_games: 32
  sample_states: 128
  weak_mcts_simulations: 4

expert:
  label_simulations: 16
  label_rollouts: 2
  strong_simulation_scale: 2
  strong_fraction: 0.1

eval:
  quick_games: 16
  quick_num_workers: 4
  quick_agent_simulations: 8
  quick_baseline_simulations: 16
  quick_baseline_rollouts: 2
  official_games: 32
  official_num_workers: 4
  official_agent_simulations: 16
  official_baseline_simulations: 1000
  official_baseline_rollouts: 20
  quick_gate_games: 16
  quick_threshold_for_official: 0.90
  acceptance_target_winrate: 0.90

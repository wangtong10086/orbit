version: 1
kind: vg_sopd_launch

experiment:
  id: v-vg-sopd-minimal
  variable: vg-sopd-smoke
  hypothesis: staged frontier/relabel/compile improves trainable signal density

student_model_revision: Qwen/Qwen2.5-0.5B-Instruct
environments:
  - GAME
  - NAVWORLD

frontier_task_source:
  kind: local_file
  label: FRONTIER
  path: data/vg_sopd/frontier_tasks.jsonl

teacher_policy:
  teachers:
    - name: game-search
      kind: specialized
    - name: dense-whitebox
      kind: white_box
    - name: critique-blackbox
      kind: black_box
  env_policies:
    GAME:
      primary: game-search
      fallbacks:
        - dense-whitebox
    NAVWORLD:
      primary: dense-whitebox
      fallbacks:
        - critique-blackbox

cold_start:
  enabled: true
  dataset:
    kind: local_file
    label: BOOT
    path: data/vg_sopd/cold_start.jsonl
  training:
    label: cold-start-sft
    train_config:
      model: Qwen/Qwen2.5-0.5B-Instruct
      output_dir: /tmp/checkpoints
      num_train_epochs: 1
      max_length: 1024
    execution:
      template_id: local-host

frontier:
  samples_per_task: 2
  execution:
    template_id: local-host

relabel:
  success_threshold: 0.99
  near_miss_threshold: 0.5
  preference_margin: 0.05
  execution:
    template_id: local-host

compile:
  compiler_recipe_version: vg_sopd_v1
  include_gkd_when_available: true
  execution:
    template_id: local-host

sft_stage:
  label: iteration-sft
  train_config:
    model: Qwen/Qwen2.5-0.5B-Instruct
    output_dir: /tmp/checkpoints
    num_train_epochs: 1
    max_length: 1024
  execution:
    template_id: local-host

preference_stage:
  label: iteration-preference
  train_config:
    model: Qwen/Qwen2.5-0.5B-Instruct
    train_type: rlhf
    rlhf_type: dpo
    output_dir: /tmp/checkpoints
    num_train_epochs: 1
    max_length: 1024
  execution:
    template_id: local-host

guardrails:
  enabled: false

iteration_count: 1
output_root: artifacts/vg_sopd

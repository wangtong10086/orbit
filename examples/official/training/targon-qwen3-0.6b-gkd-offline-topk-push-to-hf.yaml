version: 1
kind: training_launch

required_env:
  - HF_TOKEN
  - TARGON_API_KEY
  - TARGON_PROJECT_ID
  - TARGON_SSH_KEY_UID

experiment:
  id: official-qwen3-0p6b-gkd-offline-topk-publish
  variable: qwen3 0.6b offline-topk gkd on local dataset with hf upload
  hypothesis: a prepared offline teacher top-k dataset can drive native ms-swift GKD and upload the final artifact to Hugging Face
  notes: |
    End-to-end offline-topk example.
    This file assumes the offline collection phase has already completed and
    `dataset.path` now points at a JSONL file that already contains:
      - `messages`
      - `response_token_ids`
      - `teacher_topk_indices`
      - `teacher_topk_logprobs`
    In this mode training does not load `teacher_model` and does not call
    `teacher_model_server`.
    Edit experiment id, dataset path, Hugging Face repo id, and rental names
    before use.

dataset:
  kind: local_file
  label: GKD
  path: /abs/path/prepared_offline_topk_gkd.jsonl

training:
  model: Qwen/Qwen3-0.6B
  train_type: rlhf
  rlhf_type: gkd
  teacher_data_mode: offline_topk
  tuner_type: lora
  quant_method: bnb
  quant_bits: 4
  dtype: bfloat16
  attn_impl: sdpa
  learning_rate: 1.0e-4
  max_length: 1024
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  num_gpus: 1
  packing: false
  dataset_num_proc: 1
  gradient_checkpointing: true
  save_steps: 1000
  save_total_limit: 3
  logging_steps: 1
  output_dir: /workspace/bundle/artifacts/checkpoints
  report_to: none
  swift_passthrough:
    gkd_logits_topk: 20

publish:
  push_to_hub: true
  hub_model_id: your-hf-username/official-qwen3-0p6b-gkd-offline-topk
  create_repo: true
  private: true

execution:
  template_id: targon-rental-host
  bundle_dir: /tmp/personal-project-qwen3-0p6b-gkd-offline-topk/bundle
  detach: true
  resources:
    gpu_type: NVIDIA-H200
    gpu_count: 1
    cpu_count: 0
    memory_gb: 0
  target:
    kind: provision_targon_ssh_rental
    workload_name: personal-project-qwen3-0p6b-gkd-offline-topk
    machine_name: personal-project-qwen3-0p6b-gkd-offline-topk-h200
    resource: h200-small
    image: ghcr.io/wangtong10086/orbit:latest
    public_key: ~/.ssh/id_ed25519.pub

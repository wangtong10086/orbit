[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "orbit-control-plugin"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "aiohttp>=3,<4",
    "anthropic>=0.40,<1",
    "httpx>=0.27,<1",
    "huggingface_hub>=0.26,<1",
    "nest-asyncio>=1.6,<2",
    "openai>=1.54,<2",
    "targon-sdk>=0.1",
]

[project.entry-points."orbit.cli_commands"]
control = "orbit_control_plugin:control"
data = "orbit_control_plugin:data"
monitor = "orbit_control_plugin:monitor"

[tool.setuptools.packages.find]
where = ["src"]
include = ["orbit_control_plugin*"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "orbit-env-affinetes"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2,<3",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["orbit_env_affinetes*"]

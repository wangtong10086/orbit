id: local-docker
description: Run a bundle in a local Docker container.
placement:
  kind: local
launch_mode:
  kind: docker_image
defaults:
  image: ghcr.io/wangtong10086/orbit:latest
  detach: true
  resources:
    gpu_type: unknown
    gpu_count: 1
    cpu_count: 0
    memory_gb: 0
allow_overrides:
  - image
  - resources
  - runtime_env
  - detach
